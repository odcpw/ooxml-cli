name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_PROFILE_DEV_DEBUG: "0"

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run CI gate
        run: make check-ci

  office-schema-conformance-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build Rust CLI
        run: cargo build --bin ooxml

      - name: Run Office schema/conformance smoke
        shell: pwsh
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass `
            -File .\tools\windows-office-edit-smoke.ps1 `
            -RepoRoot . `
            -BinaryPath .\target\debug\ooxml.exe `
            -SkipBuild `
            -MutationParallelism 4 `
            -RequireOpenXmlSdk `
            -RunConformance `
            -SkipOffice `
            -WriteArtifactProofMatrix
