name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_PROFILE_DEV_DEBUG: "0"

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run CI gate
        run: make check-ci

  rust-cross-platform:
    name: Rust compile (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Compile all Rust targets
        run: cargo check --all-targets

      - name: Run full portable Rust test gate
        run: cargo test --all-targets

  office-schema-conformance-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build Rust CLI
        run: cargo build --bin ooxml

      - name: Run Office schema/conformance smoke
        shell: pwsh
        run: |
          $targetDir = (cargo metadata --format-version 1 --no-deps | ConvertFrom-Json).target_directory
          $debugBin = Join-Path $targetDir "debug\ooxml.exe"
          powershell.exe -NoProfile -ExecutionPolicy Bypass `
            -File .\tools\windows-office-edit-smoke.ps1 `
            -RepoRoot . `
            -BinaryPath $debugBin `
            -SkipBuild `
            -MutationParallelism 4 `
            -RequireOpenXmlSdk `
            -RunConformance `
            -SkipOffice `
            -WriteArtifactProofMatrix
